# Notifies the Astropayload CMS when the setup PR is merged.
# Add repository secrets (Settings → Secrets → Actions):
#   ASTROPAYLOAD_URL          — e.g. https://cms.example.com
#   ASTROPAYLOAD_REPORT_TOKEN — same value as DEPLOY_REPORT_TOKEN on the platform repo
name: Astropayload setup notify

on:
  pull_request:
    types: [closed]

jobs:
  notify-merge:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'astropayload/setup-')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read tenant slug
        id: cfg
        run: |
          if [ ! -f astropayload.config.json ]; then
            echo "::error ::astropayload.config.json not found"
            exit 1
          fi
          SLUG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('astropayload.config.json','utf8')).tenantSlug||'')")
          if [ -z "$SLUG" ]; then
            echo "::error ::tenantSlug missing in astropayload.config.json"
            exit 1
          fi
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Notify Payload
        env:
          PAYLOAD_URL: ${{ secrets.ASTROPAYLOAD_URL }}
          REPORT_TOKEN: ${{ secrets.ASTROPAYLOAD_REPORT_TOKEN }}
        run: |
          if [ -z "$PAYLOAD_URL" ] || [ -z "$REPORT_TOKEN" ]; then
            echo "::warning ::ASTROPAYLOAD_URL / ASTROPAYLOAD_REPORT_TOKEN not set — skip CMS notify"
            exit 0
          fi
          curl -fsS -X POST "${PAYLOAD_URL%/}/api/tenants/report-github-setup" \
            -H "content-type: application/json" \
            -H "x-deploy-report-token: $REPORT_TOKEN" \
            -d "{\"slug\":\"${{ steps.cfg.outputs.slug }}\",\"status\":\"ready\",\"prUrl\":\"${{ github.event.pull_request.html_url }}\",\"notes\":\"Setup PR merged in client repo.\"}"
